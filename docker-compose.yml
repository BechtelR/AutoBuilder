services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: autobuilder-postgres
    environment:
      POSTGRES_USER: autobuilder
      POSTGRES_PASSWORD: autobuilder
      POSTGRES_DB: autobuilder
    ports:
      - "5432:5432"
    volumes:
      - autobuilder-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autobuilder"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autobuilder-redis
    ports:
      - "6379:6379"
    volumes:
      - autobuilder-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: .
    container_name: autobuilder-gateway
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      AUTOBUILDER_DB_URL: postgresql+asyncpg://autobuilder:autobuilder@postgres:5432/autobuilder
      AUTOBUILDER_REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ~/.autobuilder:/home/appuser/.autobuilder
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app

  worker:
    build: .
    container_name: autobuilder-worker
    command: ["arq", "app.workers.settings.WorkerSettings"]
    volumes:
      - ~/.autobuilder:/home/appuser/.autobuilder
    env_file: .env
    environment:
      AUTOBUILDER_DB_URL: postgresql+asyncpg://autobuilder:autobuilder@postgres:5432/autobuilder
      AUTOBUILDER_REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app

  migrate:
    build: .
    container_name: autobuilder-migrate
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      AUTOBUILDER_DB_URL: postgresql+asyncpg://autobuilder:autobuilder@postgres:5432/autobuilder
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  autobuilder-pgdata:
  autobuilder-redis-data:
